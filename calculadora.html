<style>
body{
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
    text-align:center;
}

/* 🔥 NEON DO NOME (ANIMADO) */
h1{
    margin-top:20px;
    font-size:clamp(28px,5vw,60px);
    animation: neon 1.5s infinite alternate;
}

@keyframes neon{
    0%{color:#0ff; text-shadow:0 0 10px #0ff,0 0 20px #0ff;}
    50%{color:#ff00ff; text-shadow:0 0 20px #ff00ff,0 0 40px #ff00ff;}
    100%{color:#00ff00; text-shadow:0 0 20px #00ff00,0 0 40px #00ff00;}
}

/* RELÓGIO */
#relogio{
    font-size:clamp(16px,3vw,28px);
    margin-bottom:20px;
}

/* CALCULADORA */
.calculadora{
    width:90%;
    max-width:350px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px #0ff;
}

#display{
    width:100%;
    height:60px;
    font-size:clamp(18px,4vw,24px);
    margin-bottom:15px;
    border:none;
    text-align:right;
    padding:10px;
    box-sizing:border-box;
    border-radius:8px;
}

/* BOTÕES */
.botoes{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

button{
    padding:15px;
    font-size:clamp(14px,2.5vw,18px);
    border:none;
    background:#222;
    color:white;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}

/* clique */
button:active{
    transform:scale(0.92);
}

/* 🔥 NEON NOS BOTÕES */
button:hover{
    background:#0ff;
    color:black;
    box-shadow:0 0 20px #0ff,0 0 40px #0ff;
}

/* MENU */
.menu{
    margin-top:25px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
}

.menu a{
    padding:12px 20px;
    background:#111;
    color:white;
    text-decoration:none;
    border-radius:20px;
    transition:0.3s;
}

/* neon menu */
.menu a:nth-child(1):hover{
    background:#0ff;
    box-shadow:0 0 20px #0ff;
}

.menu a:nth-child(2):hover{
    background:#ff00ff;
    box-shadow:0 0 20px #ff00ff;
}

.menu a:nth-child(3):hover{
    background:#00ff00;
    box-shadow:0 0 20px #00ff00;
}

.menu a:nth-child(4):hover{
    background:#ffaa00;
    box-shadow:0 0 20px #ffaa00;
}

/* 📱 RESPONSIVO REAL */
@media (max-width:480px){

    .botoes{
        grid-template-columns:repeat(4,1fr);
    }

    button{
        padding:12px;
    }

    #display{
        height:50px;
    }

    .menu a{
        padding:10px 14px;
        font-size:14px;
    }
}
</style>

<body>

<h1>ILDEBRANDO LEANDRO</h1>
<div id="relogio"></div>

<div class="calculadora">
<input type="text" id="display" readonly>

<div class="botoes">
<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">/</button>
<button onclick="sqrt()">√</button>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('*')">*</button>
<button onclick="pow()">xy</button>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">-</button>
<button onclick="sin()">sin</button>

<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>
<button onclick="calc()">=</button>
<button onclick="add('+')">+</button>
<button onclick="cos()">cos</button>

<button onclick="clearDisplay()">C</button>
<button onclick="tan()">tan</button>
</div>

<script>
// RELÓGIO
setInterval(()=>{
    let d = new Date();
    document.getElementById("relogio").innerText =
    d.toLocaleTimeString();
},1000);

// CALCULADORA
function add(v){
    display.value += v;
}

function calc(){
    try{
        display.value = eval(display.value);
    }catch{
        display.value = "Erro";
    }
}

function clearDisplay(){
    display.value = "";
}

function sqrt(){
    display.value = Math.sqrt(eval(display.value));
}

function pow(){
    display.value += "**";
}

function sin(){
    display.value = Math.sin(eval(display.value));
}

function cos(){
    display.value = Math.cos(eval(display.value));
}

function tan(){
    display.value = Math.tan(eval(display.value));
}
</script>
