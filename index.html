<style>

/* Globo animado */
.globe {
    width: 200px;
    height: 200px;
    margin: 20px auto;
    border-radius: 50%;
    background: url('https://upload.wikimedia.org/wikipedia/commons/6/6f/Earth_Eastern_Hemisphere.jpg');
    background-size: cover;
    animation: rotateGlobe 20s linear infinite;
    box-shadow: 0 0 30px #00f0ff;
}

@keyframes rotateGlobe {
    from { background-position: 0 0; }
    to { background-position: 1000px 0; }
}

.results {
    max-width: 800px;
    margin: auto;
}

.result-item {
    margin: 20px 0;

    background: #111;
    border-radius: 10px;

<body>

<div class="header">
    <div class="logo">Search ICLF</div>
</div>

<div class="search-box">
    <input type="text" id="query" placeholder="Pesquisar...">
    <button onclick="buscar()">Buscar</button>
</div>

<div class="globe"></div>

<div class="results" id="results"></div>

<script>
async function buscar() {
    const query = document.getElementById('query').value.trim();
    const resultsDiv = document.getElementById('results');

    if (!query) {
        resultsDiv.innerHTML = "Digite algo para pesquisar.";
        return;
    }

    resultsDiv.innerHTML = "Buscando...";

    try {
        const url = "https://pt.wikipedia.org/w/api.php?action=query&list=search&srsearch=" 
        + encodeURIComponent(query) 
        + "&format=json&origin=*";

        const response = await fetch(url);

        if (!response.ok) {
            throw new Error("Erro na requisição");
        }

        const data = await response.json();

        resultsDiv.innerHTML = "";

        if (!data.query || !data.query.search.length) {
            resultsDiv.innerHTML = "Nenhum resultado encontrado.";
            return;
        }

        data.query.search.forEach(item => {
            const div = document.createElement('div');
            div.className = 'result-item';

            div.innerHTML = `
                <a href="https://pt.wikipedia.org/wiki/${item.title.replace(/ /g, '_')}" target="_blank">
                    ${item.title}
                </a>
                <p>${item.snippet}</p>
            `;

            resultsDiv.appendChild(div);
        });

    } catch (error) {
        console.error(error);
        resultsDiv.innerHTML = "Erro ao buscar. Pressione F12 e veja o console.";
    }
}

// Enter funciona
document.getElementById("query").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        buscar();
    }
});
</script>
