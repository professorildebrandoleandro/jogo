<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Arial;
}

/* 🔥 NEON FORTE */
.neon {
    text-align: center;
    font-size: clamp(24px,5vw,40px);
    padding: 10px;
    animation: neon 1.5s infinite alternate;
}

@keyframes neon {
    0% { color:#0ff; text-shadow:0 0 10px #0ff,0 0 20px #0ff; }
    50% { color:#ff00ff; text-shadow:0 0 20px #ff00ff; }
    100% { color:#00ff00; text-shadow:0 0 20px #00ff00; }
}

/* CONTROLES */
.controls {
    display: flex;
    gap: 10px;
    padding: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

input {
    padding: 10px;
    width: 250px;
    max-width: 90%;
    border-radius: 8px;
    border: none;
}

/* BOTÕES PRINCIPAIS */
button {
    padding: 10px;
    cursor: pointer;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 8px;
    transition: 0.3s;
}

/* NEON BOTÕES */
button:hover {
    background:#0ff;
    color:black;
    box-shadow:0 0 20px #0ff,0 0 40px #0ff;
}

/* MAPA */
#map {
    width: 100%;
    height: 70vh;
}

/* 🔥 MENU NEON COLORIDO */
.menu {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    padding: 15px;
}

.menu a {
    padding: 12px 20px;
    background: #111;
    color: white;
    text-decoration: none;
    border-radius: 20px;
    transition: 0.3s;
}

/* cores diferentes */
.menu a:nth-child(1):hover {
    background:#0ff;
    box-shadow:0 0 20px #0ff;
}
.menu a:nth-child(2):hover {
    background:#ff00ff;
    box-shadow:0 0 20px #ff00ff;
}
.menu a:nth-child(3):hover {
    background:#00ff00;
    box-shadow:0 0 20px #00ff00;
}
.menu a:nth-child(4):hover {
    background:#ffaa00;
    box-shadow:0 0 20px #ffaa00;
}

/* 📱 RESPONSIVO */
@media (max-width:480px){

    .controls{
        flex-direction: column;
        align-items: center;
    }

    button{

    }

<body>

<div class="neon">ILDEBRANDO LEANDRO - GPS AVANÇADO</div>

<div class="controls">
    <input type="text" id="search" placeholder="Buscar endereço...">
    <button onclick="buscarEndereco()">Buscar</button>
    <button onclick="getLocation()">Minha Localização</button>
</div>

<div id="map"></div>

<!-- 🔥 MENU DE NAVEGAÇÃO -->

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
var map = L.map('map').setView([-23.5505, -46.6333], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

var marker;
var control;
var userLatLng;

function getLocation() {
    navigator.geolocation.getCurrentPosition(function(position) {
        var lat = position.coords.latitude;
        var lon = position.coords.longitude;

        userLatLng = L.latLng(lat, lon);

        map.setView([lat, lon], 15);

        if (marker) map.removeLayer(marker);

        marker = L.marker([lat, lon]).addTo(map)
            .bindPopup("Você está aqui").openPopup();
    });
}

function buscarEndereco() {
    var endereco = document.getElementById("search").value;

    fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${endereco}`)
    .then(res => res.json())
    .then(data => {
        if (data.length > 0) {
            var lat = data[0].lat;
            var lon = data[0].lon;

            var destino = L.latLng(lat, lon);

            map.setView(destino, 15);

            if (control) map.removeControl(control);

            if (userLatLng) {
                control = L.Routing.control({
                    waypoints: [userLatLng, destino],
                    routeWhileDragging: true
                }).addTo(map);
            } else {
                L.marker(destino).addTo(map)
                    .bindPopup("Destino encontrado").openPopup();
            }
        } else {
            alert("Endereço não encontrado");
        }
    });
}
</script>
