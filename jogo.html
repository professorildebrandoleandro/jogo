<body>
<canvas id="game" width="900" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function load(src){
    const img = new Image();
    img.src = src;
    return img;
}

//////////////////////////////////////////////////
// 🔊 SISTEMA DE SOM EMBUTIDO (SEM MP3)
//////////////////////////////////////////////////
const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, duration){
    const osc = AudioCtx.createOscillator();
    const gain = AudioCtx.createGain();

    osc.connect(gain);
    gain.connect(AudioCtx.destination);

    osc.frequency.value = freq;
    osc.type = "square";

    gain.gain.setValueAtTime(0.1, AudioCtx.currentTime);

    osc.start();
    osc.stop(AudioCtx.currentTime + duration);
}

// sons estilo jogo
function somPulo(){ beep(600, 0.1); }
function somMoeda(){ beep(1000, 0.1); }
function somGameOver(){ beep(200, 0.3); }

// música simples contínua
let musicaAtiva = false;

function musicaLoop(){
    if(!musicaAtiva) return;

    beep(300,0.2);
    setTimeout(()=>beep(400,0.2),200);
    setTimeout(()=>beep(500,0.2),400);
    setTimeout(musicaLoop,800);
}

// desbloquear áudio
document.addEventListener("click", ()=>{
    AudioCtx.resume();
    if(!musicaAtiva){
        musicaAtiva = true;
        musicaLoop();
    }
}, {once:true});

//////////////////////////////////////////////////
// IMAGENS
//////////////////////////////////////////////////
const idle = load("jogo1.png");
const walk1 = load("jogo5.png");
const walk2 = load("jogo6.png");
const jumpImg = load("jogo7.png");

const coinImg = load("jogo10.png");
const enemyImg = load("jogo13.png");
const blocoImg = load("jogo11.png");

const groundImg = load("jogo16.png");
const logo = load("logo.png");

//////////////////////////////////////////////////
// PLAYER
//////////////////////////////////////////////////
let player = {
    x:100,y:100,w:60,h:60,
    dy:0,gravity:0.8,jump:-15,grounded:false
};

let keys = {};
let frame = 0;
let cameraX = 0;
let score = 0;

let groundParts = [
    {x:0, width:600},
    {x:720, width:500}
];

let groundY = 300;

let enemies = [{x:900,y:270}];
let blocks = [{x:500,y:220}];
let coins = [{x:400,y:250}];

function collision(a,b,w=40,h=40){
    return a.x < b.x+w &&
           a.x+a.w > b.x &&
           a.y < b.y+h &&
           a.y+a.h > b.y;
}

function drawPlayer(){
    let img;

    if(!player.grounded) img = jumpImg;
    else if(keys["ArrowRight"] || keys["ArrowLeft"]){
        frame++;
        img = frame%20<10 ? walk1 : walk2;
    } else img = idle;

    ctx.drawImage(img, player.x, player.y, player.w, player.h);
}

function gerarTerreno(){
    let ultimo = groundParts[groundParts.length-1].x;
    let gap = 120 + Math.random()*120;
    let inicio = ultimo + gap;

    groundParts.push({
        x:inicio,
        width:300 + Math.random()*300
    });

    enemies.push({ x:inicio+150, y:270 });
    blocks.push({ x:inicio+120, y:180 });
    coins.push({ x:inicio+180, y:240 });
}

function update(){

    if(keys["ArrowRight"]) player.x += 6;
    if(keys["ArrowLeft"]) player.x -= 6;

    player.dy += player.gravity;
    player.y += player.dy;

    player.grounded = false;

    groundParts.forEach(g=>{
        if(player.x+player.w > g.x && player.x < g.x+g.width){
            if(player.y+player.h > groundY){
                player.y = groundY-player.h;
                player.dy = 0;
                player.grounded = true;
            }
        }
    });

    blocks.forEach(b=>{
        if(
            player.x + player.w > b.x &&
            player.x < b.x + 40 &&
            player.y + player.h > b.y &&
            player.y + player.h < b.y + 20 &&
            player.dy >= 0
        ){
            player.y = b.y - player.h;
            player.dy = 0;
            player.grounded = true;
        }
    });

    if((keys[" "] || keys["ArrowUp"]) && player.grounded){
        player.dy = player.jump;
        somPulo();
    }

    if(!player.grounded && player.y > 500){
        somGameOver();
        setTimeout(()=>location.reload(),300);
    }

    enemies.forEach(e=>{
        e.x += (player.x < e.x ? -2 : 2);

        if(collision(player,e)){
            somGameOver();
            setTimeout(()=>location.reload(),300);
        }
    });

    coins = coins.filter(c=>{
        if(collision(player,c,20,20)){
            score++;
            somMoeda();
            return false;
        }
        return true;
    });

    cameraX = player.x - 200;

    if(player.x > groundParts[groundParts.length-1].x - 300){
        gerarTerreno();
    }
}

function draw(){

    ctx.fillStyle="#87CEEB";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(logo, canvas.width/2 - 250, 10, 500, 120);

    groundParts.forEach(g=>{
        for(let i=0;i<g.width;i+=80){
            ctx.drawImage(groundImg, g.x+i-cameraX, groundY, 80, 40);
        }
    });

    blocks.forEach(b=>{
        ctx.drawImage(blocoImg, b.x-cameraX, b.y,40,40);
    });

    coins.forEach(c=>{
        ctx.drawImage(coinImg, c.x-cameraX, c.y,20,20);
    });

    enemies.forEach(e=>{
        ctx.drawImage(enemyImg, e.x-cameraX, e.y,30,30);
    });

    ctx.save();
    ctx.translate(-cameraX,0);
    drawPlayer();
    ctx.restore();

    ctx.fillStyle="black";
    ctx.fillText("Pontos: "+score,20,20);
}

function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    update();
    draw();
    requestAnimationFrame(loop);
}

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

loop();


document.getElementById("left").ontouchstart = () => keys["ArrowLeft"] = true;
document.getElementById("left").ontouchend = () => keys["ArrowLeft"] = false;

document.getElementById("right").ontouchstart = () => keys["ArrowRight"] = true;
document.getElementById("right").ontouchend = () => keys["ArrowRight"] = false;

document.getElementById("jump").ontouchstart = () => keys[" "] = true;
document.getElementById("jump").ontouchend = () => keys[" "] = false;
</script>
