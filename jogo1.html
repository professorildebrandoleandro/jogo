<style>

body{
    margin:0;
    background:black;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;

    display:block;

    background:#87CEEB;

    height:auto;

/* CONTROLES MOBILE */

    position:fixed;
    bottom:20px;

    #controls{ display:none; }

<body>

<img src="logo.png" class="logo">

<canvas id="game"></canvas>

<div id="controls">
    <button id="left">⬅️</button>
    <button id="jump">⬆️</button>
    <button id="right">➡️</button>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 400;

/* RESPONSIVO */
function resize(){
    const scale = Math.min(
    window.innerWidth / canvas.width,
    (window.innerHeight * 0.8) / canvas.height
);
    canvas.style.width = canvas.width * scale + "px";
    canvas.style.height = canvas.height * scale + "px";
}
resize();
window.addEventListener("resize", resize);

/* IMAGENS */
const playerImg = new Image(); playerImg.src = "jogo1.png";
const coinImg = new Image(); coinImg.src = "jogo10.png";
const blockImg = new Image(); blockImg.src = "jogo11.png";
const pipeImg = new Image(); pipeImg.src = "jogo12.png";
const enemyImg = new Image(); enemyImg.src = "jogo13.png";
const groundImg = new Image(); groundImg.src = "jogo16.png";

/* SONS */
const coinSound = new Audio("coin.wav");
const gameOverSound = new Audio("gameover.wav");

/* PLAYER */
let player = {
    x:100,
    y:250,
    w:50,
    h:50,
    dy:0,
    gravity:0.6,
    jump:-9,
    grounded:false
};

/* CONTROLES */
let keys = {};

document.getElementById("left").ontouchstart = ()=> keys.left=true;
document.getElementById("left").ontouchend = ()=> keys.left=false;

document.getElementById("right").ontouchstart = ()=> keys.right=true;
document.getElementById("right").ontouchend = ()=> keys.right=false;

document.getElementById("jump").ontouchstart = ()=> keys.jump=true;
document.getElementById("jump").ontouchend = ()=> keys.jump=false;

/* ELEMENTOS */
let coins = [];
let enemies = [];
let pipes = [];
let blocks = [];

let score = 0;

/* SPAWN */
function spawnEnemy(){
    enemies.push({
        x: canvas.width,
        y:260,
        speed:2 + Math.random()*2
    });
}

function spawnCoin(){
    coins.push({
        x: canvas.width,
        y:150 + Math.random()*100
    });
}

function spawnPipe(){
    pipes.push({
        x: canvas.width,
        y:260
    });
}

function spawnBlock(){
    blocks.push({
        x: canvas.width,
        y:200
    });
}

/* UPDATE */
function update(){

    if(keys.left) player.x -= 5;
    if(keys.right) player.x += 5;

    player.dy += player.gravity;
    player.y += player.dy;

    if(player.y + player.h > 300){
        player.y = 300 - player.h;
        player.dy = 0;
        player.grounded = true;
    }

    if(keys.jump && player.grounded){
        player.dy = player.jump;
    }

    /* MOEDAS */
    coins.forEach(c=> c.x -= 3);
    coins = coins.filter(c=>{
        if(
            player.x < c.x+30 &&
            player.x+player.w > c.x &&
            player.y < c.y+30 &&
            player.y+player.h > c.y
        ){
            score++;
            coinSound.currentTime = 0;
            coinSound.play();
            return false;
        }
        return true;
    });

    /* INIMIGOS */
    enemies.forEach(e=>{
        e.x -= e.speed;

        if(
            player.x < e.x+40 &&
            player.x+player.w > e.x &&
            player.y < e.y+40 &&
            player.y+player.h > e.y
        ){
            gameOverSound.play();
            setTimeout(()=>location.reload(),300);
        }
    });

    /* CANOS */
    pipes.forEach(p=> p.x -= 3);

    /* BLOCOS */
    blocks.forEach(b=> b.x -= 3);

    /* SPAWN CONTÍNUO */
    if(Math.random() < 0.02) spawnEnemy();
    if(Math.random() < 0.03) spawnCoin();
    if(Math.random() < 0.01) spawnPipe();
    if(Math.random() < 0.015) spawnBlock();

}

/* DRAW */
function draw(){

    ctx.fillStyle="#87CEEB";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    /* CHÃO */
    for(let i=0;i<canvas.width;i+=70){
        ctx.drawImage(groundImg,i,300,70,50);
    }

    /* PLAYER */
    ctx.drawImage(playerImg,player.x,player.y,player.w,player.h);

    /* MOEDAS */
    coins.forEach(c=>{
        ctx.drawImage(coinImg,c.x,c.y,30,30);
    });

    /* CANOS */
    pipes.forEach(p=>{
        ctx.drawImage(pipeImg,p.x,p.y,60,60);
    });

    /* BLOCOS */
    blocks.forEach(b=>{
        ctx.drawImage(blockImg,b.x,b.y,40,40);
    });

    /* INIMIGOS */
    enemies.forEach(e=>{
        ctx.drawImage(enemyImg,e.x,e.y,40,40);
    });

    ctx.fillStyle="black";
    ctx.fillText("Pontos: "+score,10,20);
}

/* LOOP */
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>
